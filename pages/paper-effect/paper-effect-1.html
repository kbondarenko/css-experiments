<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Paper effect</title>
    <link href="../../css/general.css" rel="stylesheet">
</head>
<style>
    main {
        padding: 40px;
        display: flex;
        flex-wrap: wrap;
    }

    .example {
        margin: 40px;
    }

    .paper {
        width: 400px;
        height: 500px;
        position: relative;
        background: radial-gradient(circle at 50% 50%, #f6efdd, #e6dac4);
    }

    /* with corner */

    .paper-with-corner {
        width: 400px;
        height: 500px;
        position: relative;
        background:
            radial-gradient(circle at 50% 50%, #f6efdd, #e6dac4 80%, transparent 88%),
            linear-gradient(to left bottom, transparent 50%, rgba(0 0 0 / .3) 0) no-repeat 100% 0 / 30px 30px,
            linear-gradient(-135deg, transparent 20px, #e6dac4 0);
    }

    /* shadows */

    .paper::before, .paper::after, .paper-with-corner::before, .paper-with-corner::after {
        content: '';
        position: absolute;
        bottom: 12px;
        width: 40%;
        height: 10px;
        z-index: -1;
        box-shadow: 0 5px 14px rgb(0 0 0 / 60%);
    }

    .paper::before, .paper-with-corner::before {
        left: 4px;
        transform: rotate(-6grad);
    }

    .paper::after, .paper-with-corner::after {
        right: 4px;
        transform: rotate(6grad);
    }
</style>
<body>
<main>
    <div class="example">
        <div class="paper"></div>
    </div>

    <div class="example">
        <div class="paper-with-corner"></div>
    </div>
</main>
</body>
</html>
